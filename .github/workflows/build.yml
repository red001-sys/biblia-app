name: Build Android - Bíblia Online

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm install

      - name: Build React/Vite
        run: npm run build

      - name: Instalar Capacitor CLI
        run: npm install -D @capacitor/cli

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Configurar Gradle Cache
        uses: gradle/actions/setup-gradle@v4

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Aceitar licenças Android
        run: yes | sdkmanager --licenses || true

      - name: Dar permissão ao Gradle
        run: chmod +x android/gradlew

      - name: Decodificar keystore release
        env:
          BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$BASE64" | base64 -d > android/app/release.keystore.jks

      - name: Build AAB Release
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew bundleRelease

      - name: Build APK Release
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: biblia-online-aab
          path: android/app/build/outputs/bundle/release/app-release.aab

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: biblia-online-apk
          path: android/app/build/outputs/apk/release/app-release.apk
